server:
  port: 8040

spring:
  datasource:
    url: jdbc:h2:mem:maindb

  jpa:
    hibernate:
      ddl-auto: none 

    properties:
      hibernate:
        '[format_sql]': true

    show-sql: true
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

logging:
  file:
    name: logs/application.log
  config: classpath:logback-spring.xml

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,logfile,loggers,logfiles
  endpoint:
    health:
      show-details: always
    logfile:
      access: read-only
  metrics:
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
  prometheus:
    metrics:
      export:
        enabled: true