server:
  port: 8040

spring:
  datasource:
    url: jdbc:h2:mem:maindb

  jpa:
    hibernate:
      ddl-auto: none 

    properties:
      hibernate:
        '[format_sql]': true

    show-sql: true
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    mongodb:
      uri: mongodb://usr:pwd@localhost:27017/hw14?authSource=admin

  batch:
    job:
      enabled: true
    jdbc:
      initialize-schema: always
