server:
  port: 8040

spring:
  datasource:
    url: jdbc:h2:mem:maindb

  jpa:
    hibernate:
      ddl-auto: none 

    properties:
      hibernate:
        '[format_sql]': true

    show-sql: true
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mvc:
    hiddenmethod:
      filter:
        enabled: true
