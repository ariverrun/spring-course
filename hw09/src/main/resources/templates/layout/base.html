<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Библиотека</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <th:block th:fragment="head"></th:block>
</head>
<body th:fragment="page(content)">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Библиотека</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" th:href="@{/books}">Книги</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/authors}">Авторы</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/genres}">Жанры</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <div th:replace="${content}"></div>
    </div>
    
    <footer class="footer mt-auto py-3 bg-light">
        <div class="container text-center">
            <span class="text-muted">© 2026 Библиотека</span>
        </div>
    </footer>
    
</body>
</html>
