<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: page(~{::content})}">
<head>
    <title>Список авторов</title>
</head>
<body>
    <section th:fragment="content">
        <h1>Список авторов</h1>
        
        <a th:href="@{/authors/create}" class="btn btn-primary mb-3">Добавить автора</a>
        
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Имя</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="author : ${authors}">
                    <td th:text="${author.id}"></td>
                    <td th:text="${author.fullName}"></td>
                    <td>
                        <a th:href="@{/authors/{id}(id=${author.id})}" class="btn btn-sm btn-primary">Просмотр</a>
                        <a th:href="@{/authors/{id}/edit(id=${author.id})}" class="btn btn-sm btn-warning">Редактировать</a>
                        <a th:href="@{/authors/{id}/delete(id=${author.id})}" class="btn btn-sm btn-danger">Удалить</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>
</body>
</html>
