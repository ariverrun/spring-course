<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: page(~{::content})}">
<head>
    <title></title>
</head>
<body>
    <section th:fragment="content">
        <h1 th:text="'Книга ' + ${book.id}"></h1>

        <div>
            <p>
                Название:
                <span th:text="${book.title}"></span>
            </p>
            <p>
                Автор:
                <span th:text="${book.author.fullName}"></span>
            </p>
            <p>
                Жанры:
                <ul th:each="genre : ${book.genres}">
                    <li th:text="${genre.name}"></li>
                </ul>
            </p>
        </div>

        <div>
            <p>Комментарии:</p>
            
            <a th:href="@{/books/{id}/comments/create(id=${book.id})}" class="btn btn-primary mb-3">Добавить комментарий</a>

            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Текст</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="comment : ${comments}">
                        <td th:text="${comment.id}"></td>
                        <td th:text="${comment.text}"></td>
                        <td>
                            <a th:href="@{/comments/{id}(id=${comment.id})}" class="btn btn-sm btn-primary">Просмотр</a>
                            <a th:href="@{/comments/{id}/edit(id=${comment.id})}" class="btn btn-sm btn-warning">Редактировать</a>
                            <a th:href="@{/comments/{id}/delete(id=${comment.id})}" class="btn btn-sm btn-danger">Удалить</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</body>
</html>
