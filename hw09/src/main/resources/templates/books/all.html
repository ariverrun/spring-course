<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: page(~{::content})}">
<head>
    <title>Список книг</title>
</head>
<body>
    <section th:fragment="content">
        <h1>Список книг</h1>
        
        <a th:href="@{/books/create}" class="btn btn-primary mb-3">Добавить книгу</a>
        
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>Автор</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="book : ${books}">
                    <td th:text="${book.id}"></td>
                    <td th:text="${book.title}"></td>
                    <td th:text="${book.author.fullName}"></td>
                    <td>
                        <a th:href="@{/books/{id}(id=${book.id})}" class="btn btn-sm btn-primary">Просмотр</a>
                        <a th:href="@{/books/{id}/edit(id=${book.id})}" class="btn btn-sm btn-warning">Редактировать</a>
                        <a th:href="@{/books/{id}/delete(id=${book.id})}" class="btn btn-sm btn-danger">Удалить</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>
</body>
</html>
