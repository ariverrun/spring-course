<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: page(~{::content})}">
<head>
    <title>Удалить жанр</title>
</head>
<body>
    <section th:fragment="content">
        <h1>Удалить жанр</h1>
        
        <div>
            <p>
                Вы действительно хотите удалить жанр
                <span th:text="${genre.name}"></span>
                ?
            </p>
        </div>

        <form th:action="@{/genres/{id}(id=${genre.id})}" method="post" th:method="delete">
            <button type="submit" class="btn btn-danger">Удалить</button>
            <!-- <a th:href="@{/genres}" class="btn btn-secondary">Отмена</a> -->
        </form>

    </section>
</body>
</html>
