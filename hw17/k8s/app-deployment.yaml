apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: hw17-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8040
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8040
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8040
            initialDelaySeconds: 40
            periodSeconds: 15
