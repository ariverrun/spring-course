apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      initContainers:
        - name: frontend
          image: hw17-frontend:latest
          imagePullPolicy: Never
          volumeMounts:
            - name: frontend-dist
              mountPath: /html
      containers:
        - name: nginx
          image: hw17-nginx:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          volumeMounts:
            - name: frontend-dist
              mountPath: /usr/share/nginx/html
      volumes:
        - name: frontend-dist
          emptyDir: {}
