services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8040"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8040/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        BACKEND_URL: ${BACKEND_URL}
    volumes:
      - frontend-dist:/html
    restart: "no"

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - frontend-dist:/usr/share/nginx/html
    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  frontend-dist:
